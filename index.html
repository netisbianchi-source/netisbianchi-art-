<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netis 奈逖斯 | 寫實繪畫委託</title>
    <style>
        :root {
            --dark-bg: #1a1a1a;
            --gold: #d4af37;
            --white: #ffffff;
            --bg-light: #f4f4f4;
            --discount-red: #c0392b;
        }

        body {
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            line-height: 1.6;
            margin: 0;
            color: #333;
            background-color: var(--bg-light);
        }

        .status-bar {
            background-color: var(--dark-bg);
            color: white;
            text-align: center;
            padding: 15px 0;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        header {
            text-align: center;
            padding: 50px 0;
            background: var(--white);
            margin-bottom: 30px;
            border-bottom: 3px solid var(--gold);
        }

        .main-title { font-size: 2.5rem; margin: 0; color: var(--dark-bg); letter-spacing: 2px; }
        .sub-title { font-size: 1.1rem; color: var(--gold); margin-top: 10px; }

        .section {
            background: var(--white);
            padding: 30px;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 { border-left: 5px solid var(--gold); padding-left: 15px; color: var(--dark-bg); }

        .price-val { color: var(--gold); font-weight: 800; }

        /* 計算顯示區塊 */
        .calc-display {
            background: var(--dark-bg);
            color: var(--gold);
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            margin-top: 20px;
            border: 2px solid var(--gold);
        }

        .calc-display span { font-size: 2rem; font-weight: bold; }
        .duration-tag { color: #fff; font-size: 0.9rem; margin-top: 10px; display: block; opacity: 0.8; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, select, textarea {
            width: 100%; padding: 12px; border: 1px solid #ddd;
            border-radius: 6px; box-sizing: border-box; font-size: 1rem;
        }

        .promo-text { color: var(--discount-red); font-size: 0.85rem; font-weight: bold; }

        .submit-btn {
            background: var(--dark-bg);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 18px;
            width: 100%;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 20px;
        }

        .submit-btn:hover { background: var(--gold); color: var(--dark-bg); }
        footer { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>

    <div class="status-bar">
        目前排單進度：<span style="color:var(--gold)">3 / 9</span> (開放中)
    </div>

    <header>
        <h1 class="main-title">Netis 奈逖斯</h1>
        <p class="sub-title">「捕捉光影細膩質感，為您留下珍貴時刻」</p>
    </header>

    <div class="container">
        
        <section class="section">
            <h2>服務報價與優惠</h2>
            <div style="margin-bottom: 15px;">
                <p>● 精緻全彩版（無/單色背景）：<span class="price-val">$5,500</span></p>
                <p>● 精緻全彩版 + 複雜場景設計：<span class="price-val">$10,000</span></p>
            </div>
            <div style="background: #fff9f0; padding: 15px; border-radius: 8px;">
                <p><strong>【主體加購】</strong> 每增一位 +$4,000</p>
                <p class="promo-text">❤️ 優惠方案：情侶優惠 / 人寵同框優惠 ➔ 加購主體僅需 $3,500/位</p>
            </div>
        </section>

        <section class="section">
            <h2>填寫委託需求</h2>
            <form action="mailto:NetisBianchi@gmail.com" method="post" enctype="text/plain" id="commissionForm">
                
                <div class="form-group">
                    <label>您的稱呼：</label>
                    <input type="text" name="稱呼" required>
                </div>

                <div class="form-group">
                    <label>選擇委託方案：</label>
                    <select name="方案" id="planSelect" onchange="calculate()">
                        <option value="5500">精緻全彩版（無/單色背景）- $5,500</option>
                        <option value="10000">精緻全彩版 + 複雜場景 - $10,000</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>適用優惠方案：</label>
                    <select name="優惠" id="discountSelect" onchange="calculate()">
                        <option value="4000">一般報價 (加購主體 $4,000/位)</option>
                        <option value="3500">情侶/人寵甜蜜優惠 (加購主體 $3,500/位)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>總主體數量 (含第一位)：</label>
                    <select name="數量" id="countSelect" onchange="calculate()">
                        <option value="1">1 位</option>
                        <option value="2">2 位</option>
                        <option value="3">3 位</option>
                        <option value="4">4 位</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>背景與情緒需求：</label>
                    <textarea name="需求內容" rows="3" placeholder="例如：暖色調電影感、請參考附件照片..."></textarea>
                </div>

                <div class="calc-display">
                    預計委託總額<br>
                    TWD $ <span id="totalPrice">5,500</span>
                    <span class="duration-tag" id="durationText">預估製作工期：約 3-5 週</span>
                </div>

                <button type="submit" class="submit-btn">送出委託詢問</button>
            </form>
        </section>

    </div>

    <footer>
        Instagram: @1010_netis | Email: NetisBianchi@gmail.com<br>
        &copy; 2024 Netis 奈逖斯
    </footer>

    <script>
        function calculate() {
            const planPrice = parseInt(document.getElementById('planSelect').value);
            const addPrice = parseInt(document.getElementById('discountSelect').value);
            const count = parseInt(document.getElementById('countSelect').value);
            
            // 金額計算
            const total = planPrice + ((count - 1) * addPrice);
            document.getElementById('totalPrice').innerText = total.toLocaleString();

            // 工期判斷
            const durationText = document.getElementById('durationText');
            if (count === 1) {
                durationText.innerText = "預估製作工期：約 3-5 週";
            } else {
                durationText.innerText = "預估製作工期：約 5-7 週 (多主體需時較長)";
            }
        }
    </script>

</body>
</html>
